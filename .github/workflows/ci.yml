# Quality gates on pull requests and main pushes (audit remediation P1-13).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    if: github.repository == 'shiksha-mahakumbh/rase'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Security tests
        run: npm run test:security
        env:
          REGISTRATION_LOOKUP_SECRET: ci-test-lookup-secret
          ADMIN_SESSION_SECRET: ci-test-admin-secret

      - name: Production build
        run: npm run build
        env:
          SKIP_NEXT_STATIC_CHECKS: "1"
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          NEXT_PUBLIC_SITE_URL: https://www.rase.co.in
          ADMIN_SESSION_SECRET: ci-test-admin-secret
