# Run Prisma migrations against production after merge to main.
# Requires DATABASE_URL (pooled) and DIRECT_URL in repo secrets — see .github/DEPLOY_SECRETS.md
name: Prisma Migrate Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "prisma/migrations/**"
      - "prisma/schema.prisma"

concurrency:
  group: prisma-migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: github.repository == 'shiksha-mahakumbh/rase'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx prisma migrate deploy
