# Read-only Prisma schema vs production DB drift check.
# Requires DATABASE_URL + DIRECT_URL in repo secrets — see .github/DEPLOY_SECRETS.md
name: Prisma Production Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: prisma-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    if: github.repository == 'shiksha-mahakumbh/rase'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run db:validate

      - name: Audit schema vs production database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npm run audit:prisma
