# Production deploy on every main push (backup when Vercel GitHub App webhook misses).
# Requires VERCEL_DEPLOY_HOOK or VERCEL_TOKEN — see .github/DEPLOY_SECRETS.md
name: Vercel Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production-${{ github.sha }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_0PYXWQMwAV9fPWOTuxk54H9K
  VERCEL_PROJECT_ID: prj_k6YZpm35GqkuZcYOohnXVTM0Uy9f

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'shiksha-mahakumbh/rase'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "${VERCEL_TOKEN:-}" ]; then
            echo "Deploying via token (uploads checked-out source; build runs on Vercel)…"
            if npx vercel@54.15.1 deploy --prod --token="$VERCEL_TOKEN" --yes; then
              exit 0
            fi
            echo "::warning::Token deploy failed; falling back to deploy hook if set"
          fi
          if [ -n "${VERCEL_DEPLOY_HOOK:-}" ]; then
            echo "Deploying via hook (requires Vercel Git linked to main)…"
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
            exit 0
          fi
          echo "::error::Set VERCEL_TOKEN or VERCEL_DEPLOY_HOOK in repo Actions secrets. See .github/DEPLOY_SECRETS.md"
          exit 1
