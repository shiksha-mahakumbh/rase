# Manual backup deploy only — Vercel Git auto-deploy on push to main is primary.
# Run from Actions → "Run workflow" if a webhook missed. See .github/DEPLOY_SECRETS.md
name: Vercel Production Deploy (manual)

on:
  workflow_dispatch:

concurrency:
  group: vercel-production-${{ github.sha }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_0PYXWQMwAV9fPWOTuxk54H9K
  VERCEL_PROJECT_ID: prj_k6YZpm35GqkuZcYOohnXVTM0Uy9f

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'shiksha-mahakumbh/rase'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "${VERCEL_TOKEN:-}" ]; then
            echo "Deploying via token (uploads checked-out source)…"
            if npx vercel@54.15.1 pull --yes --environment=production --token="$VERCEL_TOKEN" \
              && npx vercel@54.15.1 deploy --prod --token="$VERCEL_TOKEN" --yes; then
              exit 0
            fi
            echo "::warning::Token deploy failed — regenerate VERCEL_TOKEN in GitHub secrets"
          fi
          if [ -n "${VERCEL_DEPLOY_HOOK:-}" ]; then
            echo "Deploying via hook (requires Vercel Git linked to main)…"
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
            exit 0
          fi
          echo "::error::Set VERCEL_TOKEN or VERCEL_DEPLOY_HOOK in repo Actions secrets. See .github/DEPLOY_SECRETS.md"
          exit 1

      - name: Purge ISR and warm homepage cache
        if: success()
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: https://www.rase.co.in
        run: |
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::warning::CRON_SECRET not set — skip post-deploy cache purge"
            exit 0
          fi
          echo "Waiting for Vercel production to become ready…"
          sleep 120
          for attempt in 1 2 3 4 5; do
            if curl -fsS -H "Authorization: Bearer ${CRON_SECRET}" "${SITE_URL}/api/cron/warm-cache"; then
              echo ""
              echo "Cache purged and warmed."
              exit 0
            fi
            echo "Warm-cache attempt ${attempt} failed — retry in 30s"
            sleep 30
          done
          echo "::warning::Post-deploy cache purge did not succeed — run warm-cache manually"

      - name: Production smoke test
        run: node scripts/production-smoke-test.mjs https://www.rase.co.in
