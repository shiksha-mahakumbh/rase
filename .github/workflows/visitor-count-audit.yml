# Visitor counter: DB unique visitors vs public stats API (IST).
# Requires DATABASE_URL + DIRECT_URL in repo secrets — see .github/DEPLOY_SECRETS.md
name: Visitor Count Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

concurrency:
  group: visitor-count-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    if: github.repository == 'shiksha-mahakumbh/rase'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit visitor counts vs production API
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXT_PUBLIC_SITE_URL: https://www.rase.co.in
        run: npm run audit:visitor-count
